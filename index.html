<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة باقات فودافون</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ====== شاشة تسجيل الدخول ====== -->
  <section id="login-view" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo">V</div>
        <h1>إدارة باقات فودافون</h1>
        <p class="muted">سجّل الدخول للمتابعة</p>
      </div>
      <form id="login-form" autocomplete="off">
        <label>اسم المستخدم</label>
        <input type="text" id="login-username" placeholder="اسم المستخدم" required />
        <label>كلمة السر</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
        <div id="login-error" class="error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">دخول</button>
      </form>
      <p class="hint muted">افتراضيًا الأدمن: <b>admin</b> / <b>admin123</b></p>
    </div>
  </section>

  <!-- ====== التطبيق بعد الدخول ====== -->
  <div id="app-view" class="hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-brand">
          <div class="brand-logo sm">V</div>
          <span>باقات فودافون</span>
        </div>
        <div class="topbar-right">
          <span id="who" class="who"></span>
          <button id="logout-btn" class="btn btn-ghost">خروج</button>
        </div>
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>

    <main id="content" class="content"></main>
  </div>

  <!-- ====== نافذة منبثقة عامة ====== -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modal-title">عنوان</h3>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
